<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holiday Agent</title>
    <!-- Link to the stylesheet served by FastAPI under /static. -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <!-- Page header -->
        <h1>🌍 Holiday Agent</h1>
        <p class="subtitle">Plan your perfect trip with AI</p>

        <!-- Trip planning form; all fields are validated before submission. -->
        <form id="trip-form">
            <div class="form-group">
                <label for="destination">Destination</label>
                <input type="text" id="destination" name="destination" placeholder="e.g., Goa, Sikkim, Paris" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="start_date">Start Date</label>
                    <input type="date" id="start_date" name="start_date" required>
                </div>
                <div class="form-group">
                    <label for="end_date">End Date</label>
                    <input type="date" id="end_date" name="end_date" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="budget">Budget (₹)</label>
                    <input type="number" id="budget" name="budget" placeholder="e.g., 40000" min="1" required>
                </div>
                <div class="form-group">
                    <label for="travelers">Travelers</label>
                    <input type="number" id="travelers" name="travelers" placeholder="e.g., 2" min="1" required>
                </div>
            </div>

            <div class="form-group">
                <label for="interests">Interests</label>
                <textarea id="interests" name="interests" rows="3" placeholder="e.g., beach, nightlife, trekking, food"></textarea>
            </div>

            <button type="submit" class="btn-submit">Generate Itinerary</button>
        </form>

        <!-- Result section: hidden until the API returns a successful itinerary. -->
        <div id="result" class="result hidden">
            <h2>✨ Your Itinerary</h2>
            <div id="result-content"></div>
        </div>

        <!-- Loading spinner: shown while waiting for the backend response. -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Planning your trip...</p>
        </div>
    </div>

    <script>
        // DOM references for the form and status containers.
        const form = document.getElementById('trip-form');
        const resultDiv = document.getElementById('result');
        const resultContent = document.getElementById('result-content');
        const loadingDiv = document.getElementById('loading');

        // Handle form submission: collect inputs, call the backend, and render the Markdown result.
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Reset the UI state before starting the request.
            resultDiv.classList.add('hidden');
            loadingDiv.classList.remove('hidden');

            // Build the JSON payload from form values.
            const data = {
                destination: document.getElementById('destination').value,
                start_date: document.getElementById('start_date').value,
                end_date: document.getElementById('end_date').value,
                budget: parseFloat(document.getElementById('budget').value),
                travelers: parseInt(document.getElementById('travelers').value),
                interests: document.getElementById('interests').value
            };

            try {
                const response = await fetch('http://127.0.0.1:8000/plan_trip', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();

                if (response.ok) {
                    // Render the Markdown itinerary as HTML using the marked library.
                    resultContent.innerHTML = marked.parse(result.markdown);
                    resultDiv.classList.remove('hidden');
                } else {
                    alert('Error: ' + (result.detail || 'Something went wrong'));
                }
            } catch (err) {
                alert('Network error: ' + err.message);
            } finally {
                // Hide the spinner regardless of success or failure.
                loadingDiv.classList.add('hidden');
            }
        });
    </script>
    <!-- marked library converts Markdown returned by the API into HTML for display. -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</body>
</html>
